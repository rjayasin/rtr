name: Release

# Every push to main cuts a new release: the next minor version is computed
# from the latest tag (no commit-message conventions needed), tagged, and built
# by goreleaser in the same job.
on:
  push:
    branches: [main]
    # Only a change to something that actually shapes the published release cuts
    # a new version. This is an allowlist: anything not matched below (docs,
    # LICENSE, .gitignore, editor config, …) is excluded by default, including
    # file types that don't exist yet. Test files are matched by *.go but then
    # negated, since they're never compiled into the binary.
    #
    # If a new build input is ever added (e.g. a go:embed-ed assets dir), add it
    # here or changes to it won't trigger a release.
    paths:
      - '*.go'
      - '**/*.go'
      - '!*_test.go'
      - '!**/*_test.go'
      - 'go.mod'
      - 'go.sum'
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'

permissions:
  contents: write

# Serialize releases so two quick pushes can't race on the same next tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # svu (from goreleaser's author) computes the next version from the latest
      # tag. The `minor` subcommand always bumps the minor, ignoring commit
      # messages, so no feat/fix conventions are needed.
      - name: Tag next minor version
        run: |
          go install github.com/caarlos0/svu/v3@latest
          next=$(svu minor)
          git tag "$next"
          git push origin "$next"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
