name: Release

# Every push to main cuts a new release: the next minor version is computed
# from the latest tag (no commit-message conventions needed), tagged, and built
# by goreleaser in the same job.
on:
  push:
    branches: [main]
    # Docs- or test-only pushes shouldn't cut a release. When every file changed
    # by the push matches one of these patterns, the workflow doesn't run, so no
    # new version is tagged. Test files (*_test.go) are never compiled into the
    # binary, so changing them alone produces an identical release. Any change to
    # non-test Go code, go.mod/go.sum, or the build and release config still
    # triggers a release as before.
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '*_test.go'
      - '**/*_test.go'

permissions:
  contents: write

# Serialize releases so two quick pushes can't race on the same next tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # svu (from goreleaser's author) computes the next version from the latest
      # tag. The `minor` subcommand always bumps the minor, ignoring commit
      # messages, so no feat/fix conventions are needed.
      - name: Tag next minor version
        run: |
          go install github.com/caarlos0/svu/v3@latest
          next=$(svu minor)
          git tag "$next"
          git push origin "$next"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
