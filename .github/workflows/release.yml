name: Release

# Every push to main cuts a new release. The bump severity (major/minor/patch)
# is inferred from the Conventional Commit messages since the latest tag:
#   feat:            -> minor
#   fix:             -> patch
#   feat!/fix!/      -> major
#   BREAKING CHANGE:
# Commits with no recognized type fall back to a patch bump, so a push always
# produces a release. The tag is then built by goreleaser in the same job.
on:
  push:
    branches: [main]
    # Don't cut a release for docs- or test-only pushes.
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '*_test.go'
      - '**/*_test.go'

permissions:
  contents: write

# Serialize releases so two quick pushes can't race on the same next tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # svu (from goreleaser's author) computes the next version from the latest
      # tag. `svu next` reads the Conventional Commit messages since that tag to
      # decide major vs minor vs patch. If nothing since the last tag warrants a
      # bump (no feat/fix/breaking commits), svu returns the current version
      # unchanged; in that case we force a patch so every push still ships.
      - name: Tag next version
        run: |
          go install github.com/caarlos0/svu/v3@latest
          next=$(svu next)
          if [ "$next" = "$(svu current)" ]; then
            next=$(svu patch)
          fi
          git tag "$next"
          git push origin "$next"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
