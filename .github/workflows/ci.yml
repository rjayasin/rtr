name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: lint
        run: make lint

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...
