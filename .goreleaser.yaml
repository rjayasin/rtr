version: 2

project_name: rtr

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: rtr
    env:
      - CGO_ENABLED=0
    # Only the two platforms in use: an M-series Mac and an x86_64 NAS.
    targets:
      - darwin_arm64
      - linux_amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    # Matches what internal/update (go-selfupdate) looks for: os + arch in name.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: rjayasin
    name: rtr
